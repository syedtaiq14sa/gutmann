services:
  # Backend (Node)
  - type: web
    name: gutmann-backend
    env: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false

  # Frontend (Static Site)
  - type: web
    name: gutmann-frontend
    env: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: build
    # IMPORTANT: React bakes env vars at build time.
    # All REACT_APP_* variables below MUST be set in the Render dashboard
    # before triggering a build, otherwise the app will have no API URL
    # and all API calls will fail in production.
    envVars:
      - key: REACT_APP_API_URL
        # Set to: https://gutmann-backend.onrender.com/api
        sync: false
      - key: REACT_APP_SOCKET_URL
        # Set to: https://gutmann-backend.onrender.com
        sync: false
      - key: REACT_APP_SUPABASE_URL
        sync: false
      - key: REACT_APP_SUPABASE_ANON_KEY
        sync: false
