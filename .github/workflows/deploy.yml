name: Deploy to Render

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v3

      - name: Trigger Render Backend Deploy
        run: |
          curl -X POST "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK }}"
        if: "${{ secrets.RENDER_BACKEND_DEPLOY_HOOK != '' }}"

      - name: Trigger Render Frontend Deploy
        run: |
          curl -X POST "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK }}"
        if: "${{ secrets.RENDER_FRONTEND_DEPLOY_HOOK != '' }}"

      - name: Deploy complete
        run: echo "Deployment triggered for all services"
